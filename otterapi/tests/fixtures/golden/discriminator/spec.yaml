openapi: 3.0.0
info:
  title: Discriminator API
  version: 1.0.0
paths:
  /animals:
    get:
      operationId: listAnimals
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Animal'
components:
  schemas:
    Animal:
      oneOf:
        - $ref: '#/components/schemas/Dog'
        - $ref: '#/components/schemas/Cat'
      discriminator:
        propertyName: kind
        mapping:
          dog: '#/components/schemas/Dog'
          cat: '#/components/schemas/Cat'
    Dog:
      type: object
      required: [kind, bark]
      properties:
        kind:
          type: string
        bark:
          type: string
    Cat:
      type: object
      required: [kind, meow]
      properties:
        kind:
          type: string
        meow:
          type: string
